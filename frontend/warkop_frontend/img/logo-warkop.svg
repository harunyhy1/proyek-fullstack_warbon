<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <!-- Jalur melingkar tersembunyi khusus untuk menempelkan tulisan teks -->
    <path id="textCirclePath" d="M 150, 150 m -110, 0 a 110,110 0 1,1 220,0 a 110,110 0 1,1 -220,0" />
    
    <!-- Gradasi Warna Tembaga/Kopi Modern -->
    <linearGradient id="coffeeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a05c32" />
      <stop offset="100%" stop-color="#69371a" />
    </linearGradient>
  </defs>

  <style>
    .logo-text {
      font-family: 'Playfair Display', 'Georgia', serif;
      font-size: 21.5px;
      font-weight: 900;
      fill: #120c0a;
      letter-spacing: 5px;
    }
    .logo-subtext {
      font-family: 'Nunito', 'Arial', sans-serif;
      font-size: 11px;
      font-weight: 800;
      fill: #a05c32;
      letter-spacing: 3px;
    }
  </style>

  <!-- Lingkaran Luar Ringkas -->
  <circle cx="150" cy="150" r="135" fill="none" stroke="#a05c32" stroke-width="5" />
  <circle cx="150" cy="150" r="125" fill="none" stroke="#e6b280" stroke-width="2" stroke-dasharray="6,4" />

  <!-- TULISAN MELINGKAR: WARKOP SI BONTOT -->
  <text class="logo-text">
    <textPath href="#textCirclePath" startOffset="50%" text-anchor="middle">
      WARKOP SI BONTOT
    </textPath>
  </text>

  <!-- IKON CANGKIR KOPI (Pusat Tengah) -->
  <g transform="translate(95, 110)">
    <!-- Uap Panas Minimalis -->
    <path d="M35,15 Q40,5 35,-5" fill="none" stroke="#e6b280" stroke-width="3.5" stroke-linecap="round" />
    <path d="M55,18 Q60,8 55,-2" fill="none" stroke="#e6b280" stroke-width="3.5" stroke-linecap="round" />
    <path d="M75,15 Q80,5 75,-5" fill="none" stroke="#e6b280" stroke-width="3.5" stroke-linecap="round" />
    
    <!-- Badan Cangkir -->
    <path d="M15,25 L95,25 C95,65 15,65 15,25 Z" fill="url(#coffeeGrad)" />
    
    <!-- Gagang Cangkir -->
    <path d="M95,35 C110,35 110,55 95,55" fill="none" stroke="url(#coffeeGrad)" stroke-width="7" stroke-linecap="round" />
    
    <!-- Tatakan Cangkir -->
    <path d="M5,72 L105,72 C110,72 110,76 105,76 L5,76 C0,76 0,72 5,72 Z" fill="#e6b280" />
  </g>

  <!-- Garis Pembatas Bawah -->
  <path d="M110,215 L190,215" stroke="#e6b280" stroke-width="2" stroke-linecap="round"/>

  <!-- Teks Sub-Slogan Bawah -->
  <text x="150" y="235" text-anchor="middle" class="logo-subtext">EST. 2021</text>
</svg>
